<svg xmlns="http://www.w3.org/2000/svg" width="420" height="240" viewBox="0 0 420 240" fill="none" role="img" aria-label="Live odds bar: YES and NO shares shift over time as bettor agents trade">
  <defs>
    <linearGradient id="ob-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1320"/>
      <stop offset="1" stop-color="#0a0c14"/>
    </linearGradient>
    <linearGradient id="ob-yes" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ob-no" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="ob-grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="420" height="240" rx="16" fill="url(#ob-bg)"/>
  <rect width="420" height="240" rx="16" fill="url(#ob-grid)"/>
  <rect x="0.5" y="0.5" width="419" height="239" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- header -->
  <g font-family="'Space Grotesk','Segoe UI',sans-serif">
    <text x="28" y="40" font-size="13" font-weight="700" letter-spacing="1.2" fill="#f4f6fb">LIVE TRUST PRICE</text>
    <g transform="translate(330 30)">
      <rect width="62" height="20" rx="10" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.45"/>
      <circle cx="13" cy="10" r="3.2" fill="#34d399">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="24" y="14" font-family="'JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#7ee0b8">LIVE</text>
    </g>
  </g>

  <!-- the stacked odds bar -->
  <g transform="translate(28 86)">
    <!-- track -->
    <rect width="364" height="40" rx="10" fill="#11162a" stroke="#ffffff" stroke-opacity="0.06"/>
    <!-- YES segment grows/shrinks -->
    <clipPath id="ob-clip"><rect width="364" height="40" rx="10"/></clipPath>
    <g clip-path="url(#ob-clip)">
      <rect height="40" fill="url(#ob-yes)" fill-opacity="0.9">
        <animate attributeName="width" values="200;245;212;268;230;200"
          keyTimes="0;0.2;0.45;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <!-- NO segment is the remainder, drawn from the right -->
      <rect x="200" width="164" height="40" fill="url(#ob-no)" fill-opacity="0.85">
        <animate attributeName="x" values="200;245;212;268;230;200"
          keyTimes="0;0.2;0.45;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="width" values="164;119;152;96;134;164"
          keyTimes="0;0.2;0.45;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- divider that rides the boundary -->
    <rect width="2.5" height="40" fill="#0a0c14">
      <animate attributeName="x" values="200;245;212;268;230;200"
        keyTimes="0;0.2;0.45;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- labels + animated percentages -->
  <g font-family="'JetBrains Mono',monospace">
    <text x="28" y="160" font-size="12" font-weight="700" fill="#34d399">YES</text>
    <text x="28" y="182" font-size="22" font-weight="800" fill="#eafff6">
      55<tspan font-size="13" fill="#7ee0b8">&#162;</tspan>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="0.5s" repeatCount="indefinite"/>
    </text>

    <text x="392" y="160" text-anchor="end" font-size="12" font-weight="700" fill="#f87171">NO</text>
    <text x="392" y="182" text-anchor="end" font-size="22" font-weight="800" fill="#ffecec">
      45<tspan font-size="13" fill="#f2a3a3">&#162;</tspan>
    </text>
  </g>

  <!-- caption -->
  <g font-family="'Inter','Segoe UI',sans-serif" text-anchor="middle">
    <text x="210" y="216" font-size="11" fill="#8b93a7">pool ratio = capital-weighted probability of success</text>
  </g>
</svg>
