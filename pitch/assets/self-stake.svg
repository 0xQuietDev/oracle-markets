<svg xmlns="http://www.w3.org/2000/svg" width="360" height="300" viewBox="0 0 360 300" fill="none" role="img" aria-label="Self-stake is a bet: a coin locked on the agent's own success">
  <defs>
    <linearGradient id="ss-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1320"/>
      <stop offset="1" stop-color="#0a0c14"/>
    </linearGradient>
    <linearGradient id="ss-coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="ss-coinface" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#c7d2fe"/>
      <stop offset="1" stop-color="#818cf8"/>
    </radialGradient>
    <filter id="ss-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="ss-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="360" height="300" rx="16" fill="url(#ss-bg)"/>
  <rect width="360" height="300" rx="16" fill="url(#ss-grid)"/>
  <rect x="0.5" y="0.5" width="359" height="299" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- the lock body -->
  <g transform="translate(180 196)" filter="url(#ss-glow)">
    <!-- shackle -->
    <path d="M-28 -30 a28 28 0 0 1 56 0 v18" fill="none" stroke="#8b93a7" stroke-width="9" stroke-linecap="round">
      <animate attributeName="d"
        values="M-28 -30 a28 28 0 0 1 56 0 v18;M-28 -22 a28 28 0 0 1 56 0 v10;M-28 -30 a28 28 0 0 1 56 0 v18"
        dur="3.4s" repeatCount="indefinite"/>
    </path>
    <!-- body -->
    <rect x="-46" y="-12" width="92" height="74" rx="14" fill="#11162a" stroke="#818cf8" stroke-opacity="0.55" stroke-width="2"/>
    <!-- keyhole -->
    <circle cx="0" cy="18" r="8" fill="#818cf8"/>
    <rect x="-3.5" y="18" width="7" height="20" rx="3" fill="#818cf8"/>
    <text x="0" y="56" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#8b93a7">STAKED</text>
  </g>

  <!-- the coin dropping in and locking -->
  <g filter="url(#ss-glow)">
    <g>
      <circle cx="180" cy="70" r="30" fill="url(#ss-coinface)" stroke="#e0e7ff" stroke-opacity="0.6" stroke-width="2"/>
      <circle cx="180" cy="70" r="22" fill="none" stroke="#312e81" stroke-opacity="0.4" stroke-width="2"/>
      <text x="180" y="78" text-anchor="middle" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="26" font-weight="800" fill="#1e1b4b">&#36;</text>
      <!-- the coin falls into the lock, then resets -->
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 96; 0 96; 0 0"
        keyTimes="0; 0.45; 0.85; 1"
        dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity"
        values="1;1;1;0;1" keyTimes="0;0.45;0.82;0.9;1" dur="3.4s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- caption -->
  <g font-family="'Space Grotesk','Segoe UI',sans-serif" text-anchor="middle">
    <text x="180" y="30" font-size="13" font-weight="700" letter-spacing="1.5" fill="#f4f6fb">SELF-STAKE = A BET</text>
  </g>
  <g font-family="'JetBrains Mono',monospace" text-anchor="middle">
    <text x="180" y="284" font-size="11" font-weight="700" fill="#818cf8">&#8805; 10% on its OWN success</text>
  </g>
</svg>
